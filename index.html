        body {

            background-color: #020617;
        }

        .reveal {
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        .glass {
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .glass:hover {
            border-color: rgba(16, 185, 129, 0.3);
            background: rgba(15, 23, 42, 0.6);
        }

        .gallery-collapse {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.7s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .gallery-collapse.open {
            max-height: 2000px;
        }

        .link-hover {
            position: relative;
        }
        .link-hover::after {
            content: '';
            position: absolute;
            width: 0;
            height: 1px;
            bottom: -2px;
            left: 0;
            background-color: #34d399; /* emerald-400 */
            transition: width 0.3s ease;
        }
        .link-hover:hover::after {
            width: 100%;
        }
    </style>

        function toggleGallery(galleryId, buttonTextId) {
            const gallery = document.getElementById(galleryId);
            const btn = document.getElementById(buttonTextId);
            if (gallery.classList.contains('open')) {
                gallery.classList.remove('open');
                btn.innerText = 'Ver Galería de Fotos';
            } else {
                gallery.classList.add('open');
                btn.innerText = 'Cerrar Galería';
            }
        }

        function toggleVideoGallery(galleryId, buttonTextId) {
            const gallery = document.getElementById(galleryId);
            const btn = document.getElementById(buttonTextId);
            if (gallery.classList.contains('open')) {
                gallery.classList.remove('open');
                btn.innerText = 'Ver Videos';
                gallery.querySelectorAll('video').forEach(v => v.pause());
            } else {
                gallery.classList.add('open');
                btn.innerText = 'Cerrar Videos';
            }
        }

        function openTesis(url) {
            if(url === "#") return; 
            const modal = document.getElementById('tesis-modal');
            const iframe = document.getElementById('tesis-iframe');
            iframe.src = url;
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            document.body.style.overflow = 'hidden';
        }

        function closeTesis() {
            const modal = document.getElementById('tesis-modal');
            const iframe = document.getElementById('tesis-iframe');
            iframe.src = '';
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            document.body.style.overflow = '';
        }

                <!-- CURSOS SECTION -->
                <section id="cursos" class="py-24 bg-slate-900/20">
                  <div class="max-w-6xl mx-auto px-6">
                    <div class="reveal">
                      <h2 class="text-3xl font-bold text-white mb-16 flex items-center gap-4">
                        <span class="w-12 h-1 bg-emerald-500 rounded-full"></span>
                        Cursos y Certificaciones
                      </h2>
                      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        ${coursesHTML}
                      </div>
                    </div>
                  </div>
                </section>

                <!-- HABILIDADES SECTION -->
                <section id="habilidades" class="py-24 max-w-6xl mx-auto px-6 lg:px-8">
                  <div class="reveal">
                    <h2 class="text-3xl font-bold text-white mb-16 flex items-center justify-center gap-4">
                        Competencias Profesionales
                        <span class="w-12 h-1 bg-emerald-500 rounded-full"></span>
                    </h2>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                      ${skillsHTML}
                    </div>
                  </div>
                </section>

                <!-- FOOTER -->
                <footer class="py-20 text-center border-t border-slate-900 bg-slate-950">
                  <div class="font-black text-2xl text-emerald-400 mb-4 tracking-tighter">${initials}<span class="text-slate-100 italic">.cv</span></div>
                  <p class="text-slate-500 text-sm font-medium">
                    &copy; ${new Date().getFullYear()} ${personal.name}
                  </p>
                </footer>
            `;

            lucide.createIcons();
            setupScrollAnimations();
        }

        function setupScrollAnimations() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) entry.target.classList.add('active');
                });
            }, { threshold: 0.1 });

            document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
        }

        document.addEventListener('DOMContentLoaded', renderPortfolio);
    </script>
</body>
</html>
